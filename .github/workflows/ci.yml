name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # STAGE 1: Fast checks.
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: './go.mod'
          cache-dependency-path: go.sum
          cache: true

      - name: Verify go.mod
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2
          args: --timeout=5m

      - name: Verify license headers
        run: |
          go install github.com/google/addlicense@latest
          "$(go env GOPATH)/bin/addlicense" -check \
            -f .github/license-header.tmpl \
            -ignore '**/vendor/**' \
            $(find . -type f -name '*.go' -not -path './vendor/*')

  # STAGE 2: Heavy Logic.
  test-and-security:
    name: Test & Security
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: './go.mod'
          cache-dependency-path: go.sum
          cache: true

      - name: Run Tests (includes build)
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.out
          flags: backend
        continue-on-error: true

      - name: Run Gosec
        uses: securego/gosec@v2.27.1
        with:
          args: -no-fail -fmt sarif -out results.sarif ./...

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
        if: always()

  # The remote/ package is its own Go module, so the root ./... jobs above do not
  # cover it. Run its quality checks and tests independently.
  remote-module:
    name: Remote Module
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: remote
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'remote/go.mod'
          cache-dependency-path: remote/go.sum
          cache: true

      - name: Verify go.mod
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2
          args: --timeout=5m
          working-directory: remote

      - name: Run Tests (includes build)
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

  # The payment/ package is its own Go module, so the root ./... jobs above do not
  # cover it. Run its quality checks and tests independently.
  payment-module:
    name: Payment Module
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: payment
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'payment/go.mod'
          cache-dependency-path: payment/go.sum
          cache: true

      - name: Verify go.mod
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2
          args: --timeout=5m
          working-directory: payment

      - name: Run Tests (includes build)
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

  # STAGE 3: Parallel security + vuln scans.
  govulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Scan for secrets
        run: gitleaks dir . --redact --no-banner
