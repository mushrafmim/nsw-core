<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSW Phyto Permit Portal</title>
    <meta name="description" content="National Single Window – Phytosanitary Permit Application Portal">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #21262d;
            --border: #30363d;
            --primary: #388bfd;
            --primary-hover: #58a6ff;
            --text: #e6edf3;
            --muted: #8b949e;
            --success: #3fb950;
            --danger: #f85149;
            --warning: #d29922;
            --cyan: #39d0d8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-badge {
            background: linear-gradient(135deg, #388bfd, #9f7aea);
            border-radius: 8px;
            padding: 6px 10px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .header-sub {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .launch-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .launch-bar label {
            font-size: 0.85rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .launch-bar input {
            flex: 1;
            min-width: 200px;
            max-width: 320px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
        }

        .launch-bar input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(56, 139, 253, .15);
        }

        .btn {
            border: none;
            border-radius: 6px;
            padding: 0.55rem 1.1rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all .15s;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-ghost {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--border);
        }

        .btn-success {
            background: var(--success);
            color: #000;
        }

        .btn-success:hover {
            filter: brightness(1.1);
        }

        .btn:active {
            transform: scale(.97);
        }

        main {
            display: flex;
            flex: 1;
            gap: 0;
        }

        .portal-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            min-height: calc(100vh - 120px);
        }

        .portal-col:last-child {
            border-right: none;
        }

        .col-header {
            padding: 0.85rem 1.5rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .col-title {
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-blue {
            background: var(--primary);
        }

        .dot-cyan {
            background: var(--cyan);
        }

        .col-body {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            flex: 1;
        }

        /* Task card */
        .task-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: border-color .2s;
        }

        .task-card:hover {
            border-color: var(--primary);
        }

        .card-top {
            padding: 0.9rem 1.1rem;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.2rem;
        }

        .card-sub {
            font-size: 0.75rem;
            color: var(--muted);
            font-family: monospace;
        }

        .badge {
            font-size: 0.68rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: .04em;
            white-space: nowrap;
        }

        .badge-pending {
            background: rgba(56, 139, 253, .12);
            color: var(--primary);
            border: 1px solid rgba(56, 139, 253, .3);
        }

        .badge-queued {
            background: rgba(57, 208, 216, .12);
            color: var(--cyan);
            border: 1px solid rgba(57, 208, 216, .3);
        }

        .badge-done {
            background: rgba(63, 185, 80, .12);
            color: var(--success);
            border: 1px solid rgba(63, 185, 80, .3);
        }

        .badge-reject {
            background: rgba(248, 81, 73, .12);
            color: var(--danger);
            border: 1px solid rgba(248, 81, 73, .3);
        }

        .badge-info {
            background: rgba(210, 153, 34, .12);
            color: var(--warning);
            border: 1px solid rgba(210, 153, 34, .3);
        }

        .card-body {
            padding: 1rem 1.1rem;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        /* Form fields */
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .field label {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--muted);
        }

        .field input,
        .field select,
        .field textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.55rem 0.75rem;
            color: var(--text);
            font-family: inherit;
            font-size: 0.88rem;
            transition: border-color .15s;
            width: 100%;
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(56, 139, 253, .12);
        }

        .field input[readonly],
        .field textarea[readonly] {
            opacity: .6;
            cursor: default;
            background: var(--surface2);
        }

        .field-row {
            display: flex;
            gap: 0.75rem;
        }

        .field-row .field {
            flex: 1;
        }

        .section-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .07em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.4rem;
            margin-bottom: 0.1rem;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-top: 0.1rem;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .radio-option input[type=radio] {
            accent-color: var(--primary);
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        .radio-option span {
            font-size: 0.88rem;
        }

        .feedback-box {
            background: rgba(248, 81, 73, .07);
            border-left: 3px solid var(--danger);
            border-radius: 0 6px 6px 0;
            padding: 0.6rem 0.75rem;
        }

        .feedback-box .fb-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--danger);
            margin-bottom: 0.2rem;
        }

        .feedback-box p {
            font-size: 0.85rem;
            margin: 0;
        }

        .queued-notice {
            background: rgba(57, 208, 216, .07);
            border: 1px solid rgba(57, 208, 216, .2);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            color: var(--cyan);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .history-card summary {
            padding: 0.85rem 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            list-style: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .history-card summary::-webkit-details-marker {
            display: none;
        }

        .history-body {
            padding: 0.85rem 1.1rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            color: var(--muted);
        }

        .history-body span b {
            color: var(--text);
        }

        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: var(--muted);
            text-align: center;
            padding: 3rem;
        }

        .empty-icon {
            font-size: 2rem;
            opacity: .4;
        }

        .empty p {
            font-size: 0.88rem;
        }

        .dice {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 2px 4px;
            opacity: .6;
            transition: opacity .15s;
        }

        .dice:hover {
            opacity: 1;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrap input,
        .input-wrap textarea {
            padding-right: 2rem;
        }

        .input-wrap .dice {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
        }

        .input-wrap.ta-wrap .dice {
            top: 10px;
            transform: none;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 1.8s infinite ease-in-out;
        }
        .dot-warning { background: var(--warning); box-shadow: 0 0 8px var(--warning); }
        .dot-purple { background: #9f7aea; box-shadow: 0 0 8px #9f7aea; }
        .dot-cyan { background: var(--primary); box-shadow: 0 0 8px var(--primary); }
        .dot-done { background: var(--success); box-shadow: 0 0 8px var(--success); }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <div class="logo-badge">NSW</div>
            <div>
                <div style="font-weight:600;font-size:1rem;">Phyto Permit Portal</div>
                <div class="header-sub">Data-Driven Orchestration Demo</div>
            </div>
        </div>
        <button class="btn btn-ghost" onclick="fetchTasks()">↻ Refresh</button>
    </header>

    <div class="launch-bar">
        <label for="applicantInput">Applicant Name</label>
        <input id="applicantInput" type="text" placeholder="e.g. Acme Farms Ltd." value="Acme Farms Ltd.">

        <label for="workflowSelect">Workflow Blueprint</label>
        <select id="workflowSelect"
            style="max-width: 250px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 0.75rem; color: var(--text); font-family: inherit; font-size: 0.9rem; outline: none; transition: border-color 0.15s;">
            <option value="classic">Standard Phyto Application (3-Step)</option>
            <option value="npqs" selected>NPQS Phytosanitary Permit (10-Step)</option>
        </select>

        <button class="btn btn-primary" onclick="startWorkflow()">🚀 Launch Process Application</button>
    </div>

    <main>
        <!-- User Portal -->
        <div class="portal-col">
            <div class="col-header">
                <div class="col-title">
                    <div class="dot dot-blue"></div> User Portal
                </div>
                <span style="font-size:.75rem;color:var(--muted);">APPLICANT ACTIONS</span>
            </div>
            <div class="col-body" id="userCol">
                <div class="empty">
                    <div class="empty-icon">📋</div>
                    <p>No active tasks</p>
                </div>
            </div>
        </div>

        <!-- Reviewer Portal -->
        <div class="portal-col">
            <div class="col-header">
                <div class="col-title">
                    <div class="dot dot-cyan"></div> Reviewer / External Portal
                </div>
                <span style="font-size:.75rem;color:var(--muted);">OFFICER & LAB ACTIONS</span>
            </div>
            <div class="col-body" id="reviewerCol">
                <div class="empty">
                    <div class="empty-icon">🔍</div>
                    <p>No pending reviews</p>
                </div>
            </div>
        </div>

        <!-- History -->
        <div class="portal-col">
            <div class="col-header">
                <div class="col-title">
                    <div class="dot" style="background:var(--muted)"></div> Completed / Dispatched
                </div>
            </div>
            <div class="col-body" id="historyCol">
                <div class="empty">
                    <div class="empty-icon">✅</div>
                    <p>Completed tasks appear here</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ── Random fill helpers ──────────────────────────────────────────────────────
        const RAND = {
            name: ["Acme Farms Ltd.", "Green Valley Co.", "Sunrise Orchards", "Blue Ridge Produce", "Coastal Growers"],
            loc: ["123 Farm Rd, Orange NSW 2800", "45 Valley Way, Bathurst NSW 2795", "88 Orchard Lane, Griffith NSW 2680"],
            crop: ["Apples", "Citrus", "Stone Fruit", "Grapes", "Mangoes"],
            dest: ["Japan", "China", "South Korea", "United States", "Singapore"],
            comment: ["Looks good, no issues.", "Please provide additional inspection docs.", "Approved pending final check.", "Commodities meet all requirements."],
        };
        function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
        function fillEl(id, key) { const e = document.getElementById(id); if (e) e.value = rand(RAND[key]); }

        // ── API ──────────────────────────────────────────────────────────────────────
        async function startWorkflow() {
            const name = document.getElementById('applicantInput').value.trim() || 'Applicant';
            const wfType = document.getElementById('workflowSelect').value;
            try {
                const r = await fetch('/api/start', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ applicant_name: name, workflow_type: wfType })
                });
                if (r.ok) { fetchTasks(); }
                else { alert('Failed to start: ' + await r.text()); }
            } catch (e) { alert('Network error'); }
        }

        async function fetchTasks() {
            try {
                const r = await fetch('/api/tasks');
                const tasks = await r.json() || [];
                renderAll(tasks);
            } catch (e) { console.error(e); }
        }

        async function submitTask(taskID, payload) {
            try {
                const r = await fetch('/api/task/' + taskID, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (r.ok) { fetchTasks(); }
                else { alert('Submit failed: ' + await r.text()); }
            } catch (e) { alert('Network error'); }
        }

        // ── Rendering ────────────────────────────────────────────────────────────────
        function renderAll(tasks) {
            const userCol = document.getElementById('userCol');
            const reviewerCol = document.getElementById('reviewerCol');
            const historyCol = document.getElementById('historyCol');

            const pending = tasks.filter(t => t.status === 'PENDING_USER' || t.status === 'PENDING_PAYMENT' || t.status === 'QUEUED_EXTERNALLY' || t.status === 'WAITING_FOR_EVENT');
            const queued = tasks.filter(t => t.status === 'QUEUED_EXTERNALLY' || t.status === 'WAITING_FOR_EVENT');
            const completed = tasks.filter(t => t.status === 'COMPLETED' || t.status === 'DISPATCHED');

            userCol.innerHTML = pending.length ? '' : '<div class="empty"><div class="empty-icon">📋</div><p>No active tasks</p></div>';
            reviewerCol.innerHTML = queued.length ? '' : '<div class="empty"><div class="empty-icon">🔍</div><p>No pending reviews</p></div>';
            historyCol.innerHTML = completed.length ? '' : '<div class="empty"><div class="empty-icon">✅</div><p>Completed tasks appear here</p></div>';

            pending.forEach(t => userCol.appendChild(renderUserCard(t)));
            queued.forEach(t => reviewerCol.appendChild(renderReviewerCard(t)));
            completed.forEach(t => historyCol.appendChild(renderHistoryCard(t)));
        }

        function renderUserCard(task) {
            const d = task.data || {};
            const uf = d.userform || {};
            const rf = d.reviewerform || {};
            const tid = task.task_id;

            const card = document.createElement('div');
            card.className = 'task-card';

            if (task.status === 'QUEUED_EXTERNALLY' || task.status === 'WAITING_FOR_EVENT') {
                const nodeID = task.subtask_node_id || '';
                let title = "Application Processing";
                let badgeText = "Under Review";
                let badgeStyle = "background:rgba(210,153,34,0.1); color:var(--warning); border-color:rgba(210,153,34,0.25)";
                let desc = "The system is performing automated and manual assessment steps.";
                let statusClass = "dot-warning";

                if (nodeID.includes('officer_review') || nodeID.includes('n1_apply') || nodeID.includes('1-application')) {
                    title = "Application Officer Review";
                    badgeText = "Under Assessment";
                    badgeStyle = "background:rgba(210,153,34,0.12); color:#ddac22; border-color:rgba(210,153,34,0.3)";
                    desc = "Your application has been safely received and is being verified by a National Single Window quarantine officer.";
                    statusClass = "dot-warning";
                } else if (nodeID.includes('sample') || nodeID.includes('wait_sample') || nodeID.includes('2-wait_on_sample')) {
                    title = "Consignment Sample Delivery";
                    badgeText = "Awaiting Sample";
                    badgeStyle = "background:rgba(159,122,234,0.12); color:#9f7aea; border-color:rgba(159,122,234,0.3)";
                    desc = "Please dispatch the required physical sample of your consignment to the agricultural quarantine laboratory. Once received, testing will start automatically.";
                    statusClass = "dot-purple";
                } else if (nodeID.includes('lab') || nodeID.includes('wait_lab') || nodeID.includes('3-wait_on_lab_results')) {
                    title = "Phytosanitary Lab Testing";
                    badgeText = "Lab Testing";
                    badgeStyle = "background:rgba(56,139,253,0.12); color:var(--primary); border-color:rgba(56,139,253,0.3)";
                    desc = "Laboratory testing is actively in progress. Analysts are verifying the sample is clear of prohibited quarantine pathogens, pests, and chemical residues.";
                    statusClass = "dot-cyan";
                } else if (nodeID.includes('fumigation') || nodeID.includes('wait_fumigation') || nodeID.includes('4-wait_on_fumigation_decision')) {
                    title = "Quarantine Fumigation Log";
                    badgeText = "Fumigation Req";
                    badgeStyle = "background:rgba(210,153,34,0.12); color:var(--warning); border-color:rgba(210,153,34,0.3)";
                    desc = "Your consignment requires methyl bromide chemical fumigation. Waiting for treatment operators to submit completed dosage logs.";
                    statusClass = "dot-warning";
                } else if (nodeID.includes('visual_decision') || nodeID.includes('visual-requirement') || nodeID.includes('visual_requirement') || nodeID.includes('5-check-visual-inspection-requirement')) {
                    title = "Inspection Requirement Decision";
                    badgeText = "Risk Checking";
                    badgeStyle = "background:rgba(56,139,253,0.12); color:var(--cyan); border-color:rgba(56,139,253,0.3)";
                    desc = "Authorized officers are running a risk-profile assessment to determine if physical farm crop visual inspection is required.";
                    statusClass = "dot-cyan";
                } else if (nodeID.includes('visual') || nodeID.includes('wait_visual') || nodeID.includes('6-visual-inspection-result')) {
                    title = "Visual Field Inspection";
                    badgeText = "Officer Dispatched";
                    badgeStyle = "background:rgba(0,186,180,0.12); color:#00bab4; border-color:rgba(0,186,180,0.3)";
                    desc = "An inspection officer is dispatched to perform physical visual assessment of the agricultural consignment.";
                    statusClass = "dot-cyan";
                } else if (nodeID.includes('docs_apply') || nodeID.includes('shipping-docs') || nodeID.includes('7-submit-shipping-docs')) {
                    title = "Shipping Documents Audit";
                    badgeText = "Auditing Documents";
                    badgeStyle = "background:rgba(56,139,253,0.12); color:var(--cyan); border-color:rgba(56,139,253,0.3)";
                    desc = "A verification specialist is reviewing your uploaded Bill of Lading, Packing List, and Commercial Invoice for international compliance.";
                    statusClass = "dot-cyan";
                } else if (nodeID.includes('issue-certificate') || nodeID.includes('issue_certificate') || nodeID.includes('9-issue-certificate')) {
                    title = "Certificate Issuance";
                    badgeText = "Generating";
                    badgeStyle = "background:rgba(63,185,80,0.12); color:var(--success); border-color:rgba(63,185,80,0.3)";
                    desc = "All quarantine clearances have passed and payments have cleared. Your Phytosanitary Certificate is being signed and registered on the IPPC hub.";
                    statusClass = "dot-done";
                }

                card.innerHTML = `
        <div class="card-top" style="background:rgba(255,255,255,0.015);">
            <div>
                <div class="card-title" style="color:var(--text-secondary); display:flex; align-items:center; gap:0.4rem;">
                    <span>🔒</span> ${title}
                </div>
                <div class="card-sub">${tid} · node: ${nodeID}</div>
            </div>
            <span class="badge" style="${badgeStyle}">${badgeText}</span>
        </div>
        <div class="card-body">
            <div class="locked-notice" style="background:rgba(255,255,255,0.02); border:1px dashed var(--border); border-radius:8px; padding:0.8rem; font-size:0.85rem; color:var(--text-secondary); display:flex; flex-direction:column; gap:0.6rem;">
                <div style="display:flex; align-items:center; gap:0.5rem; font-weight:600; color:var(--text-primary)">
                    <span class="status-dot ${statusClass}"></span>
                    <span>Waiting for External Action</span>
                </div>
                <p style="margin:0; line-height:1.4;">${desc}</p>
            </div>
            <div class="consignment-snapshot" style="margin-top:0.6rem; font-size:0.82rem; background:rgba(255,255,255,0.01); border:1px solid var(--border); border-radius:6px; padding:0.6rem; display:flex; flex-direction:column; gap:0.25rem;">
                <div>Exporter: <b>${uf.exporter_name || uf.applicant_name || 'Sunrise Orchards'}</b></div>

                    <input type="checkbox" id="${tid}_ref_fumigation" style="width:16px; height:16px; accent-color:var(--primary); cursor:pointer;">
                    <label for="${tid}_ref_fumigation" style="cursor:pointer; margin-bottom:0; font-size:0.85rem;">Require Fumigation Treatment?</label>
                </div>
            </div>
            <div class="field" style="margin-top:0.4rem;">
                <label>Comments / Reason</label>
                <div class="input-wrap ta-wrap">
                    <textarea id="${tid}_comments" rows="2" placeholder="Comments or feedback..."></textarea>
                    <button class="dice" onclick="fillEl('${tid}_comments','comment')" title="Random">🎲</button>
                </div>
            </div>
            <button class="btn btn-success" onclick="submitAppReview('${tid}')">Submit Assessment →</button>
        </div>`;
            return card;
        }

        function submitEventAction(tid, payload) {
            submitTask(tid, payload);
        }

        function submitLabResults(tid) {
            const outcome = document.querySelector(`input[name="lab_${tid}"]:checked`)?.value || 'passed';
            submitTask(tid, {
                lab_result: outcome,
                npqs: {
                    lab_result: outcome
                }
            });
        }

        function submitVisualDecision(tid) {
            const outcome = document.querySelector(`input[name="vis_req_${tid}"]:checked`)?.value || 'no';
            const req = outcome === 'yes';
            submitTask(tid, {
                visual_inspection_required: req,
                npqs: {
                    visual_inspection_required: req
                }
            });
        }

        function submitVisualResult(tid) {
            const outcome = document.querySelector(`input[name="vis_res_${tid}"]:checked`)?.value || 'passed';
            submitTask(tid, {
                visual_result: outcome,
                npqs: {
                    visual_result: outcome
                }
            });
        }

        function submitDocsReview(tid) {
            const outcome = document.querySelector(`input[name="doc_outcome_${tid}"]:checked`)?.value || 'approve';
            const comments = document.getElementById(tid + '_doc_comments')?.value?.trim() || '';
            submitTask(tid, {
                reviewerform: {
                    review_outcome: outcome,
                    rejection_reason: comments
                },
                doc_review_result: outcome,
                npqs: {
                    doc_review_result: outcome
                }
            });
        }

        function submitCertIssuance(tid) {
            const certID = document.getElementById(tid + '_cert_id')?.value?.trim() || 'CERT-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            const certURL = document.getElementById(tid + '_cert_url')?.value?.trim() || 'https://ippc.int/certs/REF-1234.pdf';
            submitTask(tid, {
                certificate_id: certID,
                certificate_url: certURL,
                npqs: {
                    certificate_id: certID,
                    certificate_url: certURL
                }
            });
        }

        function submitAppReview(tid) {
            const outcome = document.querySelector(`input[name="outcome_${tid}"]:checked`)?.value || 'approve';
            const comments = document.getElementById(tid + '_comments')?.value?.trim() || '';
            const sampleReq = document.getElementById(tid + '_ref_sample')?.checked || false;
            const fumReq = document.getElementById(tid + '_ref_fumigation')?.checked || false;
            const refNum = 'REF-NPQS-' + Math.random().toString(36).substr(2, 9).toUpperCase();

            submitTask(tid, {
                reviewerform: {
                    review_outcome: outcome,
                    reference_number: refNum,
                    sample_required: sampleReq,
                    fumigation_required: fumReq,
                    rejection_reason: comments
                },
                npqs: {
                    sample_required: sampleReq,
                    fumigation_required: fumReq
                },
                reference_number: refNum
            });
        }

        function renderHistoryCard(task) {
            const d = task.data || {};
            const uf = d.userform || {};
            const rf = d.reviewerform || {};
            const outcome = rf.review_outcome || (task.status === 'DISPATCHED' ? 'dispatched' : 'success');

            let badgeClass = 'badge-info';
            if (outcome === 'approve' || outcome === 'success') badgeClass = 'badge-done';
            if (outcome === 'reject' || outcome === 'fail') badgeClass = 'badge-reject';
            if (outcome === 'dispatched') badgeClass = 'badge-queued';

            const el = document.createElement('details');
            el.className = 'history-card';
            el.innerHTML = `
        <summary>
            <span>${uf.exporter_name || uf.applicant_name || task.task_id}</span>
            <span class="badge ${badgeClass}">${outcome.replace('_', ' ')}</span>
        </summary>
        <div class="history-body">
            <span><b>Task ID:</b> ${task.task_id}</span>
            <span><b>Exporter Address:</b> ${uf.exporter_address || uf.farm_location || '—'}</span>
            <span><b>Commodity:</b> ${uf.commodity || uf.crop_type || '—'} → ${uf.consignee_country || uf.export_destination || '—'}</span>
            <span><b>Final Status:</b> ${task.status}</span>
            ${rf.reviewer_comments ? `<span><b>Comments:</b> ${rf.reviewer_comments}</span>` : ''}
            ${d.certificate_id ? `<span><b>Certificate ID:</b> <b style="color:var(--success)">${d.certificate_id}</b></span>` : ''}
            ${d.certificate_url ? `<span><b>Download Certificate:</b> <a href="${d.certificate_url}" target="_blank" style="color:var(--primary); text-decoration:none">${d.certificate_url}</a></span>` : ''}
        </div>`;
            return el;
        }

        // Auto-refresh every 4 seconds
        //fetchTasks();
        //setInterval(fetchTasks, 4000);
    </script>
</body>

</html>
