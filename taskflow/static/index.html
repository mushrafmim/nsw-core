<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSW Task Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --surface-color: #1a1d24;
            --surface-hover: #22262f;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #2e323b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            flex-grow: 1;
            width: 100%;
            box-sizing: border-box;
        }

        .portal-layout {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
            height: calc(100vh - 150px);
        }

        .portal-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--surface-color);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .portal-header {
            padding: 1rem 1.5rem;
            background-color: var(--surface-hover);
            border-bottom: 1px solid var(--border-color);
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .portal-content {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .task-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .task-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .task-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .task-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
        }

        .task-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.5rem;
            border-radius: 999px;
            background-color: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            text-transform: uppercase;
        }

        .task-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input, select, textarea {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.75rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .input-wrapper input, .input-wrapper textarea {
            padding-right: 2.5rem;
        }

        .random-fill-icon {
            position: absolute;
            right: 8px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1.1rem;
            opacity: 0.5;
            transition: opacity 0.2s, transform 0.1s;
            padding: 4px;
            border-radius: 4px;
        }

        .input-wrapper.textarea-wrapper .random-fill-icon {
            top: 8px;
        }

        .random-fill-icon:hover {
            opacity: 1;
            background: var(--surface-hover);
        }

        .random-fill-icon:active {
            transform: scale(0.9);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: auto;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background-color: var(--surface-color);
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            color: var(--text-muted);
        }

        .refresh-btn {
            background-color: var(--surface-hover);
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .refresh-btn:hover {
            background-color: var(--border-color);
        }
    </style>
</head>
<body>

    <header>
        <h1>NSW Task Portal</h1>
        <button class="refresh-btn" onclick="fetchTasks()">↻ Refresh</button>
    </header>

    <div class="container" style="max-width: 1400px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: var(--surface-color); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border-color);">
            <div>
                <h2 style="margin: 0 0 0.5rem 0;">Start New Workflow</h2>
                <p style="margin: 0; color: var(--text-muted);">Launch a new permit application process instance.</p>
            </div>
            <button onclick="startWorkflow()" style="padding: 1rem 2rem; font-size: 1.1rem; border-radius: 8px;">🚀 Launch Application</button>
        </div>

        <p style="color: var(--text-muted);">Please complete your assigned tasks to progress the workflow.</p>
        
        <div class="portal-layout">
            <!-- User Portal -->
            <div class="portal-column">
                <div class="portal-header">
                    <span>User Portal</span>
                </div>
                <div class="portal-content" id="userTaskGrid">
                    <!-- User Tasks and Completed Applications will be rendered here -->
                </div>
            </div>

            <!-- Reviewer Portal -->
            <div class="portal-column">
                <div class="portal-header">
                    <span>Reviewer Portal</span>
                </div>
                <div class="portal-content" id="reviewerTaskGrid">
                    <!-- Reviewer Tasks will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        async function startWorkflow() {
            try {
                const response = await fetch('/api/start', { method: 'POST' });
                if (response.ok) {
                    const data = await response.json();
                    alert(`Workflow started successfully! ID: ${data.workflow_id}`);
                    fetchTasks();
                } else {
                    const text = await response.text();
                    alert(`Failed to start: ${text}`);
                }
            } catch (err) {
                console.error(err);
                alert("Network error occurred");
            }
        }

        async function fetchTasks() {
            const userGrid = document.getElementById('userTaskGrid');
            const reviewerGrid = document.getElementById('reviewerTaskGrid');
            
            userGrid.innerHTML = '<div class="empty-state">Loading tasks...</div>';
            reviewerGrid.innerHTML = '<div class="empty-state">Loading tasks...</div>';
            
            try {
                const response = await fetch('/api/tasks');
                const tasks = await response.json();
                
                // Pending L3 tasks for the portals
                const pendingTasks = tasks.filter(t => t.status === 'PENDING_L3');
                
                // Completed L2 workflows for the history section
                const completedL2 = tasks.filter(t => t.status === 'COMPLETED' && t.task_template_id === 'application_form_task');
                
                const userTasks = pendingTasks.filter(t => t.task_template_id === 'user_submission_form');
                const reviewerTasks = pendingTasks.filter(t => t.task_template_id === 'reviewer_submission_form');

                if (userTasks.length === 0 && completedL2.length === 0) {
                    userGrid.innerHTML = '<div class="empty-state"><h3>No tasks</h3><p>All caught up!</p></div>';
                } else {
                    userGrid.innerHTML = '';
                    userTasks.sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).forEach(task => {
                        userGrid.appendChild(createTaskCard(task));
                    });
                    completedL2.sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).forEach(task => {
                        userGrid.appendChild(createCompletedCard(task));
                    });
                }

                if (reviewerTasks.length === 0) {
                    reviewerGrid.innerHTML = '<div class="empty-state"><h3>No pending tasks</h3><p>All caught up!</p></div>';
                } else {
                    reviewerGrid.innerHTML = '';
                    reviewerTasks.sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).forEach(task => {
                        reviewerGrid.appendChild(createTaskCard(task));
                    });
                }

            } catch (err) {
                console.error(err);
                userGrid.innerHTML = '<div class="empty-state" style="color: var(--danger);">Failed to load tasks.</div>';
                reviewerGrid.innerHTML = '<div class="empty-state" style="color: var(--danger);">Failed to load tasks.</div>';
            }
        }

        function createCompletedCard(task) {
            const card = document.createElement('div');
            card.className = 'task-card';
            
            const appName = task.inputs?.applicant_name || 'Unknown';
            const outcome = task.inputs?.review_outcome || 'Unknown';
            
            let badgeColor = outcome === 'approve' ? 'var(--success)' : (outcome === 'reject' ? 'var(--danger)' : 'var(--text-muted)');
            
            card.innerHTML = `
                <details style="width: 100%;">
                    <summary style="cursor: pointer; display: flex; justify-content: space-between; align-items: center; outline: none;">
                        <span style="font-weight: 600;">Application: ${appName}</span>
                        <span class="task-badge" style="background-color: transparent; border: 1px solid ${badgeColor}; color: ${badgeColor}; padding: 0.2rem 0.5rem; font-size: 0.7rem;">${outcome.toUpperCase()}</span>
                    </summary>
                    <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                        <div class="task-meta">
                            <span><strong>Workflow ID:</strong> ${task.workflow_id}</span>
                            <span><strong>Completed On:</strong> ${new Date(task.created_at).toLocaleString()}</span>
                        </div>
                        <div style="margin-top: 1rem; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 6px;">
                            <p style="margin: 0; font-size: 0.9rem;"><strong>Justification:</strong> ${task.inputs?.justification || 'N/A'}</p>
                        </div>
                    </div>
                </details>
            `;
            return card;
        }

        function createTaskCard(task) {
            const card = document.createElement('div');
            card.className = 'task-card';

            const templateName = task.task_template_id === 'user_submission_form' 
                ? 'Application Submission' 
                : task.task_template_id === 'reviewer_submission_form' 
                    ? 'Review Application' 
                    : task.task_template_id;

            let formHtml = '';
            
            if (task.task_template_id === 'user_submission_form') {
                const preName = task.inputs?.applicant_name || '';
                const preJust = task.inputs?.justification || '';
                const comments = task.inputs?.reviewer_comments || '';
                
                let commentsHtml = '';
                if (comments) {
                    commentsHtml = `
                        <div style="background: rgba(239, 68, 68, 0.1); border-left: 4px solid var(--danger); padding: 10px; border-radius: 4px; margin-bottom: 1rem;">
                            <strong style="color: var(--danger); font-size: 0.9rem;">Reviewer Feedback:</strong>
                            <p style="margin: 0.25rem 0 0 0; font-size: 0.9rem;">${comments}</p>
                        </div>
                    `;
                }

                formHtml = `
                    ${commentsHtml}
                    <div class="form-group">
                        <label>Applicant Name</label>
                        <div class="input-wrapper">
                            <input type="text" id="input_name_${task.node_id}" value="${preName}" placeholder="John Doe" required>
                            <button type="button" class="random-fill-icon" onclick="fillRandom('input_name_${task.node_id}', 'name')" title="Fill Random Name">🎲</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Justification</label>
                        <div class="input-wrapper textarea-wrapper">
                            <textarea id="input_just_${task.node_id}" rows="3" placeholder="Why do you need this permit?" required>${preJust}</textarea>
                            <button type="button" class="random-fill-icon" onclick="fillRandom('input_just_${task.node_id}', 'text')" title="Fill Random Text">🎲</button>
                        </div>
                    </div>
                `;
            } else if (task.task_template_id === 'reviewer_submission_form') {
                const appName = task.inputs?.applicant_name || 'N/A';
                const appJust = task.inputs?.justification || 'N/A';
                
                formHtml = `
                    <div class="form-group" style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px; margin-bottom: 1rem;">
                        <label style="color: var(--primary-color);">Application Data from User</label>
                        <p style="margin: 0.5rem 0 0.25rem 0; font-size: 0.9rem;"><strong>Name:</strong> ${appName}</p>
                        <p style="margin: 0; font-size: 0.9rem;"><strong>Justification:</strong> ${appJust}</p>
                    </div>
                    <div class="form-group">
                        <label>Review Outcome</label>
                        <select id="input_outcome_${task.node_id}">
                            <option value="approve">Approve</option>
                            <option value="reject">Reject</option>
                            <option value="needs_more_info">Needs More Info</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Reviewer Comments</label>
                        <div class="input-wrapper">
                            <input type="text" id="input_comments_${task.node_id}" placeholder="Optional comments...">
                            <button type="button" class="random-fill-icon" onclick="fillRandom('input_comments_${task.node_id}', 'comment')" title="Fill Random Comment">🎲</button>
                        </div>
                    </div>
                `;
            } else {
                formHtml = `<div class="form-group"><p>Unknown task type</p></div>`;
            }

            card.innerHTML = `
                <div class="task-header">
                    <h3 class="task-title">${templateName}</h3>
                    <span class="task-badge">Pending</span>
                </div>
                <div class="task-meta">
                    <span><strong>Workflow:</strong> ${task.workflow_id}</span>
                    <span><strong>Node:</strong> ${task.node_id.split(':')[0]}</span>
                </div>
                ${formHtml}
                <button onclick="submitTask('${task.node_id}', '${task.task_template_id}')">Submit Task</button>
            `;

            return card;
        }

        function fillRandom(id, type) {
            const el = document.getElementById(id);
            if (!el) return;

            const names = ["Alice Smith", "Bob Jones", "Charlie Brown", "Diana Prince", "Evan Wright"];
            const justifications = [
                "I need to build a new shed in the backyard.",
                "Expanding the driveway for a new vehicle.",
                "Commercial property renovation for a new shop.",
                "Installing a new HVAC system.",
                "Adding a pool to the property."
            ];
            const comments = [
                "Looks good to me.",
                "Please provide blueprint details.",
                "Approved pending inspection.",
                "Needs revision on section 3.",
                "Everything is in order."
            ];

            if (type === 'name') {
                el.value = names[Math.floor(Math.random() * names.length)];
            } else if (type === 'text') {
                el.value = justifications[Math.floor(Math.random() * justifications.length)];
            } else if (type === 'comment') {
                el.value = comments[Math.floor(Math.random() * comments.length)];
            }
        }

        async function submitTask(taskId, templateId) {
            const output = {};

            if (templateId === 'user_submission_form') {
                output.applicant_name = document.getElementById(`input_name_${taskId}`).value;
                output.justification = document.getElementById(`input_just_${taskId}`).value;
                if (!output.applicant_name) {
                    alert("Please enter a name");
                    return;
                }
            } else if (templateId === 'reviewer_submission_form') {
                output.review_outcome = document.getElementById(`input_outcome_${taskId}`).value;
                output.reviewer_comments = document.getElementById(`input_comments_${taskId}`).value;
            }

            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        task_id: taskId,
                        output: output
                    })
                });

                if (response.ok) {
                    // Success, refresh the list
                    fetchTasks();
                } else {
                    const text = await response.text();
                    alert(`Failed to submit: ${text}`);
                }
            } catch (err) {
                console.error(err);
                alert("Network error occurred");
            }
        }

        // Initial load
        fetchTasks();
    </script>
</body>
</html>
