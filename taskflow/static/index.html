<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSW Phyto Permit Portal</title>
    <meta name="description" content="National Single Window – Phytosanitary Permit Application Portal">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #21262d;
            --border: #30363d;
            --primary: #388bfd;
            --primary-hover: #58a6ff;
            --text: #e6edf3;
            --muted: #8b949e;
            --success: #3fb950;
            --danger: #f85149;
            --warning: #d29922;
            --cyan: #39d0d8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-badge {
            background: linear-gradient(135deg, #388bfd, #9f7aea);
            border-radius: 8px;
            padding: 6px 10px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .header-sub {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .launch-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .launch-bar label {
            font-size: 0.85rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .launch-bar input {
            flex: 1;
            min-width: 200px;
            max-width: 320px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
        }

        .launch-bar input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(56, 139, 253, .15);
        }

        .btn {
            border: none;
            border-radius: 6px;
            padding: 0.55rem 1.1rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all .15s;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-ghost {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--border);
        }

        .btn-success {
            background: var(--success);
            color: #000;
        }

        .btn-success:hover {
            filter: brightness(1.1);
        }

        .btn:active {
            transform: scale(.97);
        }

        main {
            display: flex;
            flex: 1;
            gap: 0;
        }

        .portal-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            min-height: calc(100vh - 120px);
        }

        .portal-col:last-child {
            border-right: none;
        }

        .col-header {
            padding: 0.85rem 1.5rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .col-title {
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-blue {
            background: var(--primary);
        }

        .dot-cyan {
            background: var(--cyan);
        }

        .col-body {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            flex: 1;
        }

        /* Task card */
        .task-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: border-color .2s;
        }

        .task-card:hover {
            border-color: var(--primary);
        }

        .card-top {
            padding: 0.9rem 1.1rem;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.2rem;
        }

        .card-sub {
            font-size: 0.75rem;
            color: var(--muted);
            font-family: monospace;
        }

        .badge {
            font-size: 0.68rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: .04em;
            white-space: nowrap;
        }

        .badge-pending {
            background: rgba(56, 139, 253, .12);
            color: var(--primary);
            border: 1px solid rgba(56, 139, 253, .3);
        }

        .badge-queued {
            background: rgba(57, 208, 216, .12);
            color: var(--cyan);
            border: 1px solid rgba(57, 208, 216, .3);
        }

        .badge-done {
            background: rgba(63, 185, 80, .12);
            color: var(--success);
            border: 1px solid rgba(63, 185, 80, .3);
        }

        .badge-reject {
            background: rgba(248, 81, 73, .12);
            color: var(--danger);
            border: 1px solid rgba(248, 81, 73, .3);
        }

        .badge-info {
            background: rgba(210, 153, 34, .12);
            color: var(--warning);
            border: 1px solid rgba(210, 153, 34, .3);
        }

        .card-body {
            padding: 1rem 1.1rem;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        /* Form fields */
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .field label {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--muted);
        }

        .field input,
        .field select,
        .field textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.55rem 0.75rem;
            color: var(--text);
            font-family: inherit;
            font-size: 0.88rem;
            transition: border-color .15s;
            width: 100%;
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(56, 139, 253, .12);
        }

        .field input[readonly],
        .field textarea[readonly] {
            opacity: .6;
            cursor: default;
            background: var(--surface2);
        }

        .field-row {
            display: flex;
            gap: 0.75rem;
        }

        .field-row .field {
            flex: 1;
        }

        .section-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .07em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.4rem;
            margin-bottom: 0.1rem;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-top: 0.1rem;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .radio-option input[type=radio] {
            accent-color: var(--primary);
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        .radio-option span {
            font-size: 0.88rem;
        }

        .feedback-box {
            background: rgba(248, 81, 73, .07);
            border-left: 3px solid var(--danger);
            border-radius: 0 6px 6px 0;
            padding: 0.6rem 0.75rem;
        }

        .feedback-box .fb-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--danger);
            margin-bottom: 0.2rem;
        }

        .feedback-box p {
            font-size: 0.85rem;
            margin: 0;
        }

        .queued-notice {
            background: rgba(57, 208, 216, .07);
            border: 1px solid rgba(57, 208, 216, .2);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            color: var(--cyan);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .history-card summary {
            padding: 0.85rem 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            list-style: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .history-card summary::-webkit-details-marker {
            display: none;
        }

        .history-body {
            padding: 0.85rem 1.1rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            color: var(--muted);
        }

        .history-body span b {
            color: var(--text);
        }

        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: var(--muted);
            text-align: center;
            padding: 3rem;
        }

        .empty-icon {
            font-size: 2rem;
            opacity: .4;
        }

        .empty p {
            font-size: 0.88rem;
        }

        .dice {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 2px 4px;
            opacity: .6;
            transition: opacity .15s;
        }

        .dice:hover {
            opacity: 1;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrap input,
        .input-wrap textarea {
            padding-right: 2rem;
        }

        .input-wrap .dice {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
        }

        .input-wrap.ta-wrap .dice {
            top: 10px;
            transform: none;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <div class="logo-badge">NSW</div>
            <div>
                <div style="font-weight:600;font-size:1rem;">Phyto Permit Portal</div>
                <div class="header-sub">Data-Driven Orchestration Demo</div>
            </div>
        </div>
        <button class="btn btn-ghost" onclick="fetchTasks()">↻ Refresh</button>
    </header>

    <div class="launch-bar">
        <label for="applicantInput">Applicant Name</label>
        <input id="applicantInput" type="text" placeholder="e.g. Acme Farms Ltd." value="Acme Farms Ltd.">
        <button class="btn btn-primary" onclick="startWorkflow()">🚀 Launch Phyto Permit Application</button>
    </div>

    <main>
        <!-- User Portal -->
        <div class="portal-col">
            <div class="col-header">
                <div class="col-title">
                    <div class="dot dot-blue"></div> User Portal
                </div>
                <span style="font-size:.75rem;color:var(--muted);">PENDING_USER</span>
            </div>
            <div class="col-body" id="userCol">
                <div class="empty">
                    <div class="empty-icon">📋</div>
                    <p>No active tasks</p>
                </div>
            </div>
        </div>

        <!-- Reviewer Portal -->
        <div class="portal-col">
            <div class="col-header">
                <div class="col-title">
                    <div class="dot dot-cyan"></div> Reviewer Portal
                </div>
                <span style="font-size:.75rem;color:var(--muted);">QUEUED_EXTERNALLY</span>
            </div>
            <div class="col-body" id="reviewerCol">
                <div class="empty">
                    <div class="empty-icon">🔍</div>
                    <p>No pending reviews</p>
                </div>
            </div>
        </div>

        <!-- History -->
        <div class="portal-col">
            <div class="col-header">
                <div class="col-title">
                    <div class="dot" style="background:var(--muted)"></div> Completed
                </div>
            </div>
            <div class="col-body" id="historyCol">
                <div class="empty">
                    <div class="empty-icon">✅</div>
                    <p>Completed tasks appear here</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ── Random fill helpers ──────────────────────────────────────────────────────
        const RAND = {
            name: ["Acme Farms Ltd.", "Green Valley Co.", "Sunrise Orchards", "Blue Ridge Produce", "Coastal Growers"],
            loc: ["123 Farm Rd, Orange NSW 2800", "45 Valley Way, Bathurst NSW 2795", "88 Orchard Lane, Griffith NSW 2680"],
            crop: ["Apples", "Citrus", "Stone Fruit", "Grapes", "Mangoes"],
            dest: ["Japan", "China", "South Korea", "United States", "Singapore"],
            comment: ["Looks good, no issues.", "Please provide additional inspection docs.", "Approved pending final check.", "Commodities meet all requirements."],
        };
        function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
        function fillEl(id, key) { const e = document.getElementById(id); if (e) e.value = rand(RAND[key]); }

        // ── API ──────────────────────────────────────────────────────────────────────
        async function startWorkflow() {
            const name = document.getElementById('applicantInput').value.trim() || 'Applicant';
            try {
                const r = await fetch('/api/start', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ applicant_name: name })
                });
                if (r.ok) { fetchTasks(); }
                else { alert('Failed to start: ' + await r.text()); }
            } catch (e) { alert('Network error'); }
        }

        async function fetchTasks() {
            try {
                const r = await fetch('/api/tasks');
                const tasks = await r.json() || [];
                renderAll(tasks);
            } catch (e) { console.error(e); }
        }

        async function submitTask(taskID, payload) {
            try {
                const r = await fetch('/api/task/' + taskID, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (r.ok) { fetchTasks(); }
                else { alert('Submit failed: ' + await r.text()); }
            } catch (e) { alert('Network error'); }
        }

        // ── Rendering ────────────────────────────────────────────────────────────────
        function renderAll(tasks) {
            const userCol = document.getElementById('userCol');
            const reviewerCol = document.getElementById('reviewerCol');
            const historyCol = document.getElementById('historyCol');

            const pending = tasks.filter(t => t.status === 'PENDING_USER');
            const queued = tasks.filter(t => t.status === 'QUEUED_EXTERNALLY');
            const completed = tasks.filter(t => t.status === 'COMPLETED');

            userCol.innerHTML = pending.length ? '' : '<div class="empty"><div class="empty-icon">📋</div><p>No active tasks</p></div>';
            reviewerCol.innerHTML = queued.length ? '' : '<div class="empty"><div class="empty-icon">🔍</div><p>No pending reviews</p></div>';
            historyCol.innerHTML = completed.length ? '' : '<div class="empty"><div class="empty-icon">✅</div><p>Completed tasks appear here</p></div>';

            pending.forEach(t => userCol.appendChild(renderUserCard(t)));
            queued.forEach(t => reviewerCol.appendChild(renderReviewerCard(t)));
            completed.forEach(t => historyCol.appendChild(renderHistoryCard(t)));
        }

        function getStr(data, ...keys) {
            let obj = data || {};
            for (const k of keys) {
                if (obj == null) return '';
                obj = obj[k];
            }
            return obj || '';
        }

        function renderUserCard(task) {
            const d = task.data || {};
            const uf = d.userform || {};
            const rf = d.reviewerform || {};
            const tid = task.task_id;

            // Show reviewer feedback if looping back
            let feedbackHtml = '';
            if (rf.reviewer_comments) {
                feedbackHtml = `<div class="feedback-box">
            <div class="fb-label">⚠ Reviewer Feedback</div>
            <p>${rf.reviewer_comments}</p>
        </div>`;
            }

            const card = document.createElement('div');
            card.className = 'task-card';
            card.innerHTML = `
        <div class="card-top">
            <div>
                <div class="card-title">Phyto Sanitary Application</div>
                <div class="card-sub">${tid} · node: ${task.active_activity_id || '—'}</div>
            </div>
            <span class="badge badge-pending">Pending User</span>
        </div>
        <div class="card-body">
            ${feedbackHtml}
            <div class="section-label">Applicant Details</div>
            <div class="field">
                <label>Registered Applicant Name</label>
                <input type="text" id="${tid}_appname" value="${uf.applicant_name || ''}" readonly title="Auto-populated from your profile">
            </div>
            <div class="section-label">Consignment Details</div>
            <div class="field">
                <label>Farm Address / Location</label>
                <div class="input-wrap">
                    <input type="text" id="${tid}_loc" value="${uf.farm_location || ''}" placeholder="e.g. 123 Farm Rd, Orange NSW">
                    <button class="dice" onclick="fillEl('${tid}_loc','loc')" title="Random">🎲</button>
                </div>
            </div>
            <div class="field-row">
                <div class="field">
                    <label>Commodity / Crop Type</label>
                    <div class="input-wrap">
                        <input type="text" id="${tid}_crop" value="${uf.crop_type || ''}" placeholder="e.g. Apples">
                        <button class="dice" onclick="fillEl('${tid}_crop','crop')" title="Random">🎲</button>
                    </div>
                </div>
                <div class="field">
                    <label>Destination Country</label>
                    <div class="input-wrap">
                        <input type="text" id="${tid}_dest" value="${uf.export_destination || ''}" placeholder="e.g. Japan">
                        <button class="dice" onclick="fillEl('${tid}_dest','dest')" title="Random">🎲</button>
                    </div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="submitUserForm('${tid}')">Submit Application →</button>
        </div>`;
            return card;
        }

        function submitUserForm(tid) {
            const loc = document.getElementById(tid + '_loc')?.value?.trim();
            const crop = document.getElementById(tid + '_crop')?.value?.trim();
            const dest = document.getElementById(tid + '_dest')?.value?.trim();
            if (!loc || !crop || !dest) { alert('Please fill in all required fields.'); return; }
            const appName = document.getElementById(tid + '_appname')?.value?.trim();
            submitTask(tid, {
                userform: { applicant_name: appName, farm_location: loc, crop_type: crop, export_destination: dest }
            });
        }

        function renderReviewerCard(task) {
            const d = task.data || {};
            const uf = d.userform || {};
            const tid = task.task_id;

            const card = document.createElement('div');
            card.className = 'task-card';
            card.innerHTML = `
        <div class="card-top">
            <div>
                <div class="card-title">Review: ${uf.applicant_name || 'Application'}</div>
                <div class="card-sub">${tid} · node: ${task.active_activity_id || '—'}</div>
            </div>
            <span class="badge badge-queued">Queued Externally</span>
        </div>
        <div class="card-body">
            <div class="section-label">Submitted Application Data (Read Only)</div>
            <div class="field">
                <label>Applicant Name</label>
                <input type="text" value="${uf.applicant_name || ''}" readonly>
            </div>
            <div class="field">
                <label>Farm Address</label>
                <input type="text" value="${uf.farm_location || ''}" readonly>
            </div>
            <div class="field-row">
                <div class="field"><label>Commodity</label><input type="text" value="${uf.crop_type || ''}" readonly></div>
                <div class="field"><label>Destination</label><input type="text" value="${uf.export_destination || ''}" readonly></div>
            </div>
            <div class="section-label">Official Review</div>
            <div class="field">
                <label>Review Decision</label>
                <div class="radio-group">
                    <label class="radio-option"><input type="radio" name="outcome_${tid}" value="approve" checked><span>✅ Approve</span></label>
                    <label class="radio-option"><input type="radio" name="outcome_${tid}" value="reject"><span>❌ Reject</span></label>
                    <label class="radio-option"><input type="radio" name="outcome_${tid}" value="needs_more_info"><span>🔄 Needs More Info</span></label>
                </div>
            </div>
            <div class="field">
                <label>Comments / Justification</label>
                <div class="input-wrap ta-wrap">
                    <textarea id="${tid}_comments" rows="2" placeholder="Provide feedback if rejecting or requesting more info…"></textarea>
                    <button class="dice" onclick="fillEl('${tid}_comments','comment')" title="Random">🎲</button>
                </div>
            </div>
            <button class="btn btn-success" onclick="submitReview('${tid}')">Submit Review →</button>
        </div>`;
            return card;
        }

        function submitReview(tid) {
            const outcome = document.querySelector(`input[name="outcome_${tid}"]:checked`)?.value;
            const comments = document.getElementById(tid + '_comments')?.value?.trim();
            if (!outcome) { alert('Please select a review decision.'); return; }
            submitTask(tid, {
                reviewerform: { review_outcome: outcome, reviewer_comments: comments || '' }
            });
        }

        function renderHistoryCard(task) {
            const d = task.data || {};
            const uf = d.userform || {};
            const rf = d.reviewerform || {};
            const outcome = rf.review_outcome || 'unknown';

            let badgeClass = 'badge-info';
            if (outcome === 'approve') badgeClass = 'badge-done';
            if (outcome === 'reject') badgeClass = 'badge-reject';

            const el = document.createElement('details');
            el.className = 'history-card';
            el.innerHTML = `
        <summary>
            <span>${uf.applicant_name || task.task_id}</span>
            <span class="badge ${badgeClass}">${outcome.replace('_', ' ')}</span>
        </summary>
        <div class="history-body">
            <span><b>Task ID:</b> ${task.task_id}</span>
            <span><b>Farm:</b> ${uf.farm_location || '—'}</span>
            <span><b>Crop:</b> ${uf.crop_type || '—'} → ${uf.export_destination || '—'}</span>
            <span><b>Comments:</b> ${rf.reviewer_comments || '—'}</span>
        </div>`;
            return el;
        }

        // Auto-refresh every 4 seconds
        //fetchTasks();
        //setInterval(fetchTasks, 4000);
    </script>
</body>

</html>
